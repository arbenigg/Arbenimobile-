<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbeniMobile - Sistemi i Riparimeve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen max-w-md mx-auto p-6 flex flex-col">
        <header class="flex justify-between items-center py-6 mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-500">ArbeniMobile</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 font-bold">Teknologji & Servis</p>
            </div>
            <button id="navToggle" class="p-3 glass rounded-2xl">
                <i data-lucide="settings" id="navIcon" class="w-5 h-5 text-gray-400"></i>
            </button>
        </header>

        <main class="flex-grow">
            <section id="clientSection" class="space-y-8">
                <div class="text-center">
                    <h2 class="text-xl font-bold mb-2">Gjeni statusin e telefonit</h2>
                    <p class="text-gray-500 text-sm">Shkruani kodin e servisit</p>
                </div>
                <div class="relative">
                    <input type="text" id="trackInput" placeholder="Psh: AM-101" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 outline-none focus:border-blue-500 text-lg font-bold uppercase">
                    <button id="trackBtn" class="absolute right-2 top-2 bg-blue-600 p-3 rounded-xl">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="statusResult" class="hidden glass rounded-[2rem] p-8 space-y-6"></div>
            </section>

            <section id="adminSection" class="hidden space-y-6">
                <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="plus" class="text-blue-500"></i> Shto Riparim</h2>
                <div class="glass rounded-2xl p-6 space-y-4">
                    <input type="text" id="adminId" placeholder="Kodi (ID)" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none">
                    <input type="text" id="adminDevice" placeholder="Modeli" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none">
                    <select id="adminStatus" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none">
                        <option value="Në Pritje">Në Pritje</option>
                        <option value="Duke u Punuar">Duke u Punuar</option>
                        <option value="Gati">Gati</option>
                    </select>
                    <input type="range" id="adminProgress" class="w-full accent-blue-500" value="50">
                    <button id="saveOrderBtn" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Ruaj të Dhënat</button>
                </div>
            </section>
        </main>

        <footer class="py-10 text-center opacity-30">
            <p class="text-[9px] uppercase tracking-[0.4em]">ArbeniMobile Precision</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'arbenimobile-official';

        signInAnonymously(auth);
        lucide.createIcons();

        const navToggle = document.getElementById('navToggle');
        const clientSection = document.getElementById('clientSection');
        const adminSection = document.getElementById('adminSection');

        navToggle.onclick = () => {
            const isAdmin = adminSection.classList.contains('hidden');
            adminSection.classList.toggle('hidden', !isAdmin);
            clientSection.classList.toggle('hidden', isAdmin);
        };

        document.getElementById('saveOrderBtn').onclick = async () => {
            const id = document.getElementById('adminId').value.trim().toUpperCase();
            const device = document.getElementById('adminDevice').value.trim();
            const status = document.getElementById('adminStatus').value;
            const progress = document.getElementById('adminProgress').value;
            if(!id || !device) return alert("Mbushni fushat!");
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'repairs', id), { id, device, status, progress });
            alert("U ruajt!");
        };

        document.getElementById('trackBtn').onclick = async () => {
            const id = document.getElementById('trackInput').value.trim().toUpperCase();
            const resultBox = document.getElementById('statusResult');
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'repairs', id));
            if(snap.exists()){
                const data = snap.data();
                resultBox.classList.remove('hidden');
                resultBox.innerHTML = `<h3 class="text-xl font-bold">${data.device}</h3><p class="text-blue-500">${data.status}</p><div class="w-full bg-white/5 h-2 rounded-full overflow-hidden"><div class="bg-blue-500 h-full" style="width:${data.progress}%"></div></div>`;
            } else { alert("Nuk u gjet!"); }
        };
    </script>
</body>
</html>
